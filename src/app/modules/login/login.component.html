<div class="grid">
  <div class="col-12 flex-container">
    <div
      class="flex justify-content-center align-content-center text-align-center"
    >
      <form
        class="flex justify-content-center align-content-center text-align-center mt-10"
        [formGroup]="loginForm"
        (ngSubmit)="onsubmitLoginForm()"
      >
        <p-card styleClass="mt-3" header="Fazer Login">
          <div
            class="flex justify-content-center align-content-center text-align-center"
          >
            <input
              pInputText
              type="text"
              placeholder="Login"
              formControlName="login"
            />
          </div>
          <div
            class="flex justify-content-center align-content-center text-align-center mt-3"
          >
            <input
              pInputText
              type="password"
              placeholder="Senha"
              formControlName="senha"
            />
          </div>
          <div class="card flex justify-content-center mt-3">
            <button pButton pRiple type="submit" label="Fazer Login" [disabled]="!this.loginForm.valid"></button>
          </div>
        </p-card>
      </form>
    </div>
  </div>
</div>
