<div *ngIf="cidade" class="p-grid p-dir-col">
  <div class="p-col">
    <strong>ID:</strong> {{ cidade.cidId }}
  </div>
  <div class="p-col">
    <strong>Nome:</strong> {{ cidade.nome }}
  </div>
  <div class="p-col">
    <strong>Estado:</strong> {{ cidade.estado?.nome }} {{cidade.estado?.sigla}}
  </div>
</div>
