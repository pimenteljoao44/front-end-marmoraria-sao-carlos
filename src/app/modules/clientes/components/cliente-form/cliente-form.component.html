<!-- FORMULÁRIO DE NOVO CLIENTE -->
<div *ngIf="clientAction.event.action === addClientAction">
  <form [formGroup]="addClientForm" (ngSubmit)="handleSubmitAddClient()">
    <div class="card flex flex-column md:flex-column gap-3">
      <div
        class="p-field flex flex-row justify-content-center align-items-center align-content-center m-1"
      >
        <label for="pessoaFisica" class="mr-3">Pessoa Física</label>
        <p-radioButton
          class="mr-5 p-radiobutton"
          inputId="pessoaFisica"
          name="tipoPessoa"
          value="PESSOA_FISICA"
          formControlName="tipoPessoa"
          (change)="onTipoPessoaChange(addClientForm)"
        ></p-radioButton>
        <label for="pessoaJuridica" class="mr-3">Pessoa Jurídica</label>
        <p-radioButton
          inputId="pessoaJuridica"
          name="tipoPessoa"
          class="p-radiobutton"
          value="PESSOA_JURIDICA"
          formControlName="tipoPessoa"
          (change)="onTipoPessoaChange(addClientForm)"
        ></p-radioButton>
      </div>
      <input pInputText placeholder="Nome" formControlName="nome" />
      <input pInputText placeholder="Telefone" formControlName="telefone" />
      <input
        pInputText
        placeholder="CPF"
        *ngIf="addClientForm.get('tipoPessoa')?.value === 'PESSOA_FISICA'"
        formControlName="cpf"
        (input)="formatarCPF($event)"
        (keyup)="formatarCPF($event)"
        (keydown)="formatarCPF($event)"
      />
      <input
        pInputText
        placeholder="RG"
        *ngIf="addClientForm.get('tipoPessoa')?.value === 'PESSOA_FISICA'"
        formControlName="rg"
        (input)="formatarRG($event)"
        (keyup)="formatarRG($event)"
        (keydown)="formatarRG($event)"
      />
      <input
        pInputText
        placeholder="CNPJ"
        *ngIf="addClientForm.get('tipoPessoa')?.value === 'PESSOA_JURIDICA'"
        formControlName="cnpj"
        (input)="formatarCNPJ($event)"
        (keyup)="formatarCNPJ($event)"
        (keydown)="formatarCNPJ($event)"
      />

      <div formGroupName="endereco">
        <input pInputText placeholder="Rua" formControlName="rua" />
        <input pInputText placeholder="Número" formControlName="numero" />
        <input
          pInputText
          placeholder="Complemento"
          formControlName="complemento"
        />
        <input pInputText placeholder="Bairro" formControlName="bairro" />
        <div formGroupName="cidade">
          <p-dropdown
            styleClass="w-full"
            [options]="cidades"
            placeholder="Selecione a cidade"
            formControlName="cidId"
            optionLabel="nome"
            optionValue="cidId"
            (onChange)="onCidadeChange($event.value)"
          ></p-dropdown>
        </div>
      </div>

      <div
        class="flex flex-row justify-content-center align-items-center align-content-center m-1"
      >
        <button type="submit" class="p-button">Concluir</button>
      </div>
    </div>
  </form>
</div>
